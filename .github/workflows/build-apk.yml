name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Prepare Web Directory
        run: |
          # Capacitor වලට අවශ්‍ය 'www' folder එක සාදා index.html එක ඒ තුළට දමයි
          mkdir www
          cp index.html www/
          # වෙනත් images හෝ files තිබේ නම් ඒවාද copy කරගැනීමට මෙය භාවිතා කළ හැක:
          # cp -r assets www/ 2>/dev/null || true

      - name: Install Capacitor
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/android
          npm install -D @capacitor/cli

      - name: Initialize Capacitor
        run: |
          # web-dir එක 'www' ලෙස ලබා දී ඇත
          npx cap init "Cruiser" "com.cruiser.app" --web-dir www

      - name: Add Android Platform
        run: |
          npx cap add android

      - name: Sync and Copy Assets
        run: |
          npx cap sync android

      - name: Build APK (Assemble Debug)
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Cruiser-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
