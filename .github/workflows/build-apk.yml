name: Build Android APK

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/android
          npm install -D @capacitor/cli

      # මෙතනින් npx cap init ඉවත් කර ඇත, මන්ද අප දැන් capacitor.config.json සාදා ඇති බැවිනි
      
      - name: Add Android Platform
        run: |
          npx cap add android

      - name: Add GPS Permissions to Android Manifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's/<uses-permission android:name="android.permission.INTERNET" \/>/<uses-permission android:name="android.permission.INTERNET" \/>\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" \/>\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" \/>/g' $MANIFEST

      - name: Fix Kotlin Duplicates
        run: |
          echo "subprojects {
              configurations.all {
                  resolutionStrategy.eachDependency { details ->
                      if (details.requested.group == 'org.jetbrains.kotlin') {
                          details.useVersion '1.8.22'
                      }
                  }
              }
          }" >> android/build.gradle

      - name: Sync Android
        run: |
          npx cap sync android

      - name: Build APK (Assemble Debug)
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Cruiser-App-Final
          path: android/app/build/outputs/apk/debug/app-debug.apk
