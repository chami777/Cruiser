name: Build Android APK

on:
  push:
    branches: [ "main" ] # ඔයාගේ branch එක master නම් 'master' කියලා වෙනස් කරන්න
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor and Ionic CLI
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/android
          npm install -D @capacitor/cli

      - name: Initialize Capacitor
        run: |
          # App එකේ නම "Cruiser" ලෙස සහ Package Name එක වෙනස් කර ඇත
          npx cap init "Cruiser" "com.cruiser.app" --web-dir . 

      - name: Add Android Platform
        run: |
          npx cap add android

      - name: Sync Web Code to Android
        run: |
          npx cap sync android

      - name: Build APK (Assemble Debug)
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
